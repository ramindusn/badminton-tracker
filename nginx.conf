server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Single-page app: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
